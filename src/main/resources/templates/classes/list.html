<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="topbar">
    <nav class="nav">
        <a class="brand" th:href="@{/}">FitReserve</a>
        <div class="nav-links">
            <a th:href="@{/classes}">Classes</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/bookings}">My Bookings</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Admin</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/login}">Login</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/register}">Register</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="button secondary">Logout</button>
            </form>
        </div>
    </nav>
</header>
<main class="main">
    <div class="section-head">
        <div>
            <p class="eyebrow">Browse schedule</p>
            <h1>Available Gym Classes</h1>
            <p class="meta">Search by class name, category, instructor, or description.</p>
        </div>
        <div class="actions" sec:authorize="hasRole('ADMIN')">
            <a class="button secondary" th:href="@{/admin}">Admin Dashboard</a>
            <a class="button" th:href="@{/classes/new}">Add New Class</a>
        </div>
    </div>
    <form class="search-row search-panel" th:action="@{/classes}" method="get">
        <input type="search" name="keyword" th:value="${keyword}" placeholder="Example: yoga, strength, Sarah">
        <button type="submit">Search</button>
    </form>
    <p class="meta" th:if="${#lists.isEmpty(classes)}">No active classes matched your search.</p>
    <section class="grid">
        <article class="card" th:each="gymClass : ${classes}">
            <img class="class-image" th:src="${gymClass.imagePath}" th:alt="${gymClass.name}">
            <div class="card-body">
                <span class="pill" th:text="${gymClass.category}">Category</span>
                <h3 th:text="${gymClass.name}">Class name</h3>
                <p class="meta" th:text="${'Coach ' + gymClass.instructor + ' / ' + gymClass.capacity + ' seats'}"></p>
                <p th:text="${gymClass.description}">Description</p>
                <p class="meta" th:text="${#temporals.format(gymClass.startsAt, 'MMM dd, yyyy HH:mm') + ' / ' + gymClass.durationMinutes + ' min'}"></p>
                <p class="price" th:text="${'$' + gymClass.price}">$18</p>
                <a class="button" th:href="@{/classes/{id}(id=${gymClass.id})}">Book This Class</a>
            </div>
        </article>
    </section>
</main>
</body>
</html>
