<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${gymClass.name}">Class Details</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="topbar">
    <nav class="nav">
        <a class="brand" th:href="@{/}">FitReserve</a>
        <div class="nav-links">
            <a th:href="@{/classes}">Classes</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/bookings}">My Bookings</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}">Admin</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/login}">Login</a>
            <a sec:authorize="!isAuthenticated()" th:href="@{/register}">Register</a>
            <span class="nav-user" sec:authorize="isAuthenticated()" th:if="${currentUser != null}">
                <span class="nav-avatar" th:text="${currentUserInitial}">U</span>
                <strong th:text="${currentUserName}">User</strong>
            </span>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="button secondary">Logout</button>
            </form>
        </div>
    </nav>
</header>
<main class="main">
    <div class="alert error" th:if="${error}" th:text="${error}"></div>
    <div class="alert success" th:if="${success}" th:text="${success}"></div>

    <section class="detail-layout">
        <div class="detail-main">
            <img class="class-image hero-image"
                 th:src="${gymClass.imagePath != null and !gymClass.imagePath.isBlank() ? gymClass.imagePath : '/images/class-default.png'}"
                 onerror="this.onerror=null;this.src='/images/class-default.png';"
                 th:alt="${gymClass.name}">
            <div class="detail-copy">
                <span class="pill" th:text="${gymClass.category}">Category</span>
                <h1 th:text="${gymClass.name}">Class name</h1>
                <p class="detail-coach" th:text="${'Led by ' + gymClass.instructor}">Instructor</p>
                <p class="detail-description" th:text="${gymClass.description}">Class description</p>
            </div>
        </div>

        <aside class="panel booking-panel">
            <p class="booking-kicker">Your session</p>
            <div class="booking-price"><span>Per person</span><strong th:text="${'₩' + #numbers.formatDecimal(gymClass.price, 1, 'COMMA', 0, 'POINT')}">₩18,000</strong></div>
            <dl class="facts">
                <div>
                    <dt>Date and Time</dt>
                    <dd th:text="${#temporals.format(gymClass.startsAt, 'MMM dd, yyyy HH:mm')}">Date</dd>
                </div>
                <div>
                    <dt>Capacity</dt>
                    <dd th:text="${gymClass.capacity + ' seats'}">18 seats</dd>
                </div>
                <div>
                    <dt>Status</dt>
                    <dd th:text="${gymClass.active ? 'Open for booking' : 'Hidden'}">Open</dd>
                </div>
            </dl>
            <form sec:authorize="isAuthenticated()" class="form-grid" th:action="@{/bookings}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="classId" th:value="${gymClass.id}">
                <button class="wide" type="submit">Reserve Your Seat</button>
            </form>
            <div sec:authorize="!isAuthenticated()">
                <p>Please login to reserve a seat.</p>
                <a class="button" th:href="@{/login}">Login to Book</a>
            </div>
        </aside>
    </section>
</main>
</body>
</html>
