<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<main class="main auth-shell">
    <a class="brand" th:href="@{/}">FitReserve</a>
    <section class="panel">
        <p class="eyebrow">Join the studio</p>
        <h1>Create Account</h1>
        <form class="form-grid" th:action="@{/register}" th:object="${user}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <label>
                Name
                <input class="form-control" th:field="*{name}" required>
                <span class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </label>
            <label>
                Email
                <input class="form-control" type="email" th:field="*{email}" required>
                <span class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </label>
            <label>
                Password
                <input class="form-control" type="password" th:field="*{password}" required>
                <span class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </label>
            <button type="submit">Register</button>
        </form>
        <p class="meta">Already have an account? <a th:href="@{/login}">Login</a></p>
    </section>
</main>
</body>
</html>
