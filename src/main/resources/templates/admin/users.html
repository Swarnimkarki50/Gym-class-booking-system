<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Users</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="admin-shell">
    <aside class="admin-sidebar">
        <a class="brand admin-brand" th:href="@{/admin}">FitReserve</a>
        <p class="admin-label">Administration</p>
        <nav class="admin-nav">
            <a th:href="@{/admin}">Overview</a>
            <a th:href="@{/admin/classes}">Gym Classes</a>
            <a th:href="@{/admin/bookings}">Bookings</a>
            <a class="active" th:href="@{/admin/users}">Users</a>
        </nav>
        <div class="admin-sidebar-footer">
            <a class="button secondary" th:href="@{/classes}">View Member Site</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="button secondary">Logout</button>
            </form>
        </div>
    </aside>
    <main class="admin-main">
        <div class="admin-heading">
            <div>
                <p class="eyebrow">Accounts</p>
                <h1>Users</h1>
                <p class="meta">Review registered members and administrator accounts.</p>
            </div>
        </div>
        <div class="alert success" th:if="${success}" th:text="${success}"></div>
        <div class="alert error" th:if="${error}" th:text="${error}"></div>
        <div class="table-wrap admin-table">
            <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.name}">Name</td>
                <td th:text="${user.email}">email@example.com</td>
                <td><span class="status available" th:text="${user.role}">USER</span></td>
                <td>
                    <form th:if="${user.email != currentEmail}" th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="danger" type="submit">Delete</button>
                    </form>
                    <span class="meta" th:if="${user.email == currentEmail}">Current account</span>
                </td>
            </tr>
            </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
