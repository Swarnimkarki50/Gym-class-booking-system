<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Users</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="topbar">
    <nav class="nav">
        <a class="brand" th:href="@{/}">FitReserve</a>
        <div class="nav-links">
            <a th:href="@{/classes}">Classes</a>
            <a th:href="@{/admin}">Dashboard</a>
            <a th:href="@{/admin/classes}">Manage Classes</a>
            <a th:href="@{/admin/bookings}">Bookings</a>
            <a th:href="@{/admin/users}">Users</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="button secondary">Logout</button>
            </form>
        </div>
    </nav>
</header>
<main class="main">
    <div class="section-head">
        <div>
            <p class="eyebrow">Admin dashboard</p>
            <h1>User Management</h1>
            <p class="meta">Review registered members and admin accounts.</p>
        </div>
    </div>
    <div class="alert success" th:if="${success}" th:text="${success}"></div>
    <div class="alert error" th:if="${error}" th:text="${error}"></div>
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.name}">Name</td>
                <td th:text="${user.email}">email@example.com</td>
                <td><span class="status available" th:text="${user.role}">USER</span></td>
                <td>
                    <form th:if="${user.email != currentEmail}" th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="danger" type="submit">Delete</button>
                    </form>
                    <span class="meta" th:if="${user.email == currentEmail}">Current account</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
