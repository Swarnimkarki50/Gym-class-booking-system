<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formTitle}">Class Form</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="admin-shell">
    <aside class="admin-sidebar">
        <a class="brand admin-brand" th:href="@{/admin}">FitReserve</a>
        <p class="admin-label">Administration</p>
        <nav class="admin-nav">
            <a th:href="@{/admin}">Overview</a>
            <a class="active" th:href="@{/admin/classes}">Gym Classes</a>
            <a th:href="@{/admin/bookings}">Bookings</a>
            <a th:href="@{/admin/users}">Users</a>
        </nav>
        <div class="admin-sidebar-footer">
            <span class="nav-user admin-user-chip" th:if="${currentUser != null}">
                <span class="nav-avatar" th:text="${currentUserInitial}">A</span>
                <strong th:text="${currentUserName}">Admin</strong>
            </span>
            <a class="button secondary" th:href="@{/classes}">View Member Site</a>
            <a class="button secondary" th:href="@{/admin/classes}">Cancel</a>
        </div>
    </aside>
    <main class="admin-main">
        <div class="admin-heading">
            <div>
                <p class="eyebrow">Class editor</p>
                <h1 th:text="${formTitle}">Class Form</h1>
                <p class="meta">Set the schedule, capacity, pricing, and image members will see.</p>
            </div>
        </div>
        <section class="panel admin-form">
            <form class="form-grid" th:action="@{/classes}" th:object="${gymClass}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{imagePath}">
            <div class="two-col">
                <label>
                    Class Name
                    <input class="form-control" th:field="*{name}" required>
                    <span class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </label>
                <label>
                    Instructor
                    <input class="form-control" th:field="*{instructor}" required>
                    <span class="error-text" th:if="${#fields.hasErrors('instructor')}" th:errors="*{instructor}"></span>
                </label>
            </div>
            <div class="two-col">
                <label>
                    Category
                    <input class="form-control" th:field="*{category}" placeholder="Yoga, HIIT, Strength, Cycling" required>
                    <span class="error-text" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
                </label>
                <label>
                    Capacity
                    <input class="form-control" type="number" min="1" th:field="*{capacity}" required>
                    <span class="error-text" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></span>
                </label>
            </div>
            <div class="two-col">
                <label>
                    Starts At
                    <input class="form-control" type="datetime-local" th:field="*{startsAt}" required>
                    <span class="error-text" th:if="${#fields.hasErrors('startsAt')}" th:errors="*{startsAt}"></span>
                </label>
                <label>
                    Duration Minutes
                    <input class="form-control" type="number" min="15" th:field="*{durationMinutes}" required>
                    <span class="error-text" th:if="${#fields.hasErrors('durationMinutes')}" th:errors="*{durationMinutes}"></span>
                </label>
            </div>
            <label>
                Price (Korean Won)
                <input class="form-control" type="number" min="0" step="1000" th:field="*{price}" placeholder="18000" required>
                <span class="error-text" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
            </label>
            <label>
                Description
                <textarea class="form-control" th:field="*{description}" required></textarea>
                <span class="error-text" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></span>
            </label>
            <label>
                Class Image
                <input class="form-control" type="file" name="imageFile" accept="image/*">
                <span class="error-text" th:if="${#fields.hasErrors('imagePath')}" th:errors="*{imagePath}"></span>
            </label>
            <img class="current-image" th:if="${gymClass.imagePath != null and !gymClass.imagePath.isBlank()}"
                 th:src="${gymClass.imagePath}"
                 onerror="this.onerror=null;this.src='/images/class-default.png';" th:alt="${gymClass.name}">
            <label>
                <span>
                    <input type="checkbox" th:field="*{active}">
                    Active and visible to members
                </span>
            </label>
            <div class="actions">
                <button type="submit">Save Class</button>
                <a class="button secondary" th:href="@{/admin/classes}">Cancel</a>
            </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
