services:
  - type: web
    name: gym-class-booking-system
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gym-class-booking-db
          property: connectionString
      - key: JPA_DDL_AUTO
        value: update
      - key: SEED_DATA
        value: true
      - key: UPLOAD_DIR
        value: /app/uploads
databases:
  - name: gym-class-booking-db
    plan: free
